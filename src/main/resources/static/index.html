<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XixaGPT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --accent: #5DADE2;
            --accent-hover: #3498DB;
            --accent-light: rgba(93, 173, 226, 0.15);
            --text-primary: #f5f5f5;
            --text-secondary: #a1a1aa;
            --border: #2a2a2a;
            --user-bubble: #5DADE2;
            --bot-bubble: #1f1f1f;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            background: none;
            border: none;
        }

        .logo img {
            border: none;
            outline: none;
        }

        .header-info h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-info span {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        #chat-container::-webkit-scrollbar {
            width: 6px;
        }

        #chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message.user .avatar {
            background: var(--accent-light);
        }

        .message.bot .avatar {
            background: var(--bg-tertiary);
        }

        .message.bot .avatar img,
        #welcome .icon img,
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 14px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message.user .bubble {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .message.bot .bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .bubble p {
            margin-bottom: 8px;
        }

        .bubble p:last-child {
            margin-bottom: 0;
        }

        .bubble code {
            background: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
        }

        .bubble pre {
            background: var(--bg-primary);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .bubble pre code {
            background: none;
            padding: 0;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        #input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            max-width: 900px;
            margin: 0 auto;
        }

        #message-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 12px 18px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            min-height: 44px;
            line-height: 1.4;
            outline: none;
            transition: border-color 0.2s;
        }

        #message-input:focus {
            border-color: var(--accent);
        }

        #message-input::placeholder {
            color: var(--text-secondary);
        }

        #send-btn {
            width: 44px;
            height: 44px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        #send-btn:hover {
            background: var(--accent-hover);
        }

        #send-btn:active {
            transform: scale(0.95);
        }

        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #send-btn svg {
            width: 20px;
            height: 20px;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .welcome-screen .icon {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .welcome-screen h2 {
            font-size: 22px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .welcome-screen p {
            font-size: 14px;
            max-width: 400px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 24px;
            max-width: 500px;
        }

        .suggestion-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        @media (max-width: 640px) {
            header {
                padding: 12px 16px;
            }

            .header-info h1 {
                font-size: 16px;
            }

            #chat-container {
                padding: 16px;
            }

            .message {
                max-width: 92%;
            }

            .bubble {
                padding: 10px 14px;
                font-size: 14px;
            }

            #input-area {
                padding: 12px 16px;
            }

            .avatar {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }

            .welcome-screen .icon {
                width: 64px;
                height: 64px;
                border-radius: 18px;
            }

            .welcome-screen h2 {
                font-size: 18px;
            }

            .suggestions {
                flex-direction: column;
                align-items: stretch;
            }

            .suggestion-btn {
                text-align: center;
            }
        }

        @media (max-width: 360px) {
            .message {
                max-width: 96%;
            }

            #message-input {
                padding: 10px 14px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><img src="img/xixa.jpeg" alt="XixaGPT"></div>
        <div class="header-info">
            <h1>XixaGPT</h1>
            <span><span class="status-dot"></span> Online</span>
        </div>
    </header>

    <div id="chat-container">
        <div class="welcome-screen" id="welcome">
            <div class="icon"><img src="img/xixa.jpeg" alt="XixaGPT"></div>
            <h2>Como posso ajudar, Xixo?</h2>
            <p>Envie uma mensagem e eu farei o meu melhor para responder.</p>
            <div class="suggestions">
                <button class="suggestion-btn" onclick="sendSuggestion(this)">O que voc&ecirc; pode fazer?</button>
                <button class="suggestion-btn" onclick="sendSuggestion(this)">Me conte uma curiosidade</button>
                <button class="suggestion-btn" onclick="sendSuggestion(this)">Me ajude a programar</button>
            </div>
        </div>
    </div>

    <div id="input-area">
        <div class="input-wrapper">
            <textarea
                id="message-input"
                placeholder="Digite sua mensagem..."
                rows="1"
            ></textarea>
            <button id="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const welcomeScreen = document.getElementById('welcome');
        let isProcessing = false;

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function sendSuggestion(btn) {
            messageInput.value = btn.textContent;
            sendMessage();
        }

        function addMessage(text, type) {
            if (welcomeScreen) {
                welcomeScreen.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = type === 'user' ? '&#128100;' : '<img src="img/xixa.jpeg" alt="Bot">';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = formatMessage(text);

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return bubble;
        }

        function formatMessage(text) {
            if (!text) return '';
            let formatted = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            formatted = formatted.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
            formatted = formatted.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            formatted = formatted.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }

        function addTypingIndicator() {
            if (welcomeScreen) {
                welcomeScreen.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'typing';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = '<img src="img/xixa.jpeg" alt="Bot">';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isProcessing) return;

            isProcessing = true;
            sendBtn.disabled = true;
            addMessage(text, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';
            addTypingIndicator();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain',
                    },
                    body: text
                });

                removeTypingIndicator();

                if (response.ok) {
                    const reply = await response.text();
                    addMessage(reply, 'bot');
                } else {
                    addMessage('Desculpe, ocorreu um erro ao processar sua mensagem.', 'bot');
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('Erro de conex&atilde;o. Verifique se o servidor est&aacute; rodando.', 'bot');
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }
    </script>
</body>
</html>

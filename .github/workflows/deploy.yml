name: deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: pull-na-maquina
        uses: actions/checkout@v4

      - name: Compilar o codigo
        shell: powershell
        run: |
          .\mvnw clean package -DskipTests

      - name: Criar artefato para execução
        uses: actions/upload-artifact@v4
        with:
          name: app-project
          path: target/*.jar
    
  run:
    needs: build
    runs-on: self-hosted
    steps:

      - name: Baixar Artefato
        uses: actions/download-artifact@v4
        with:
          name: app-project
          path: app

      - name: run project
        shell: powershell
        run: |
          Stop-Service -Name "ChatBot" -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2
          Copy-Item "app\ChatBot-0.0.1-SNAPSHOT.jar" "C:\chatbot\ChatBot-0.0.1-SNAPSHOT.jar" -Force
          Start-Service -Name "ChatBot"
